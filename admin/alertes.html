  function getStatusClass(statut) {
    switch (statut.toLowerCase()) {
      case "en cours": return "pending";
      case "résolu": return "resolved";
      case "nouveau": return "new";
      default: return "new";
    }
  }

  function afficherAlertes(alertes) {
    tbody.innerHTML = "";
    alertes.forEach(a => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${a.date}</td>
        <td>${a.localisation}</td>
        <td>${a.description}</td>
        <td><span class="status ${getStatusClass(a.statut)}">${a.statut}</span></td>
      `;
      tbody.appendChild(row);
    });
  }

  async function chargerAlertes() {
    try {
      // 1️⃣ Récupération du localStorage
      let alertes = JSON.parse(localStorage.getItem("alertes")) || [];

      // 2️⃣ Chargement du fichier alertes.json si disponible
      try {
        const response = await fetch("alertes.json");
        if (response.ok) {
          const data = await response.json();
          alertes = [...alertes, ...data];
        }
      } catch (e) {
        console.warn("Aucun fichier alertes.json trouvé (pas bloquant)");
      }

      // 3️⃣ Fusion avec les alertes locales
      alertes = [...alertes, ...alertesLocales];

      // 4️⃣ Suppression des doublons (date + description)
      const uniques = alertes.filter(
        (a, index, self) =>
          index === self.findIndex(
            b => b.date === a.date && b.description === a.description
          )
      );

      // 5️⃣ Tri par date décroissante
      uniques.sort((a, b) => new Date(b.date.replace(/(\d{2})\/(\d{2})\/(\d{4})/, "$2/$1/$3")) - new Date(a.date.replace(/(\d{2})\/(\d{2})\/(\d{4})/, "$2/$1/$3")));

      // 6️⃣ Sauvegarde dans localStorage
      localStorage.setItem("alertes", JSON.stringify(uniques));

      // 7️⃣ Affichage
      afficherAlertes(uniques);

    } catch (error) {
      console.error("Erreur de chargement :", error);
      afficherAlertes(alertesLocales);
    }
  }

  // Lancement
  chargerAlertes();
